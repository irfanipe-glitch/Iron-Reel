<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070B12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout Randomizer">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon-192.png">
<title>Workout Randomizer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #070B12;
  --surface: #0F1A26;
  --surface-2: #162433;
  --border: #22364A;
  --muted: #8A9BAC;
  --white: #EDF2F5;
  --accent: #1E6FD9;
  --accent-dim: #0E2A45;
  --accent-2: #2FB8C4;
  --accent-2-dim: #0E2E33;
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
html,body{margin:0;padding:0;}
body{
  background: var(--bg);
  color: var(--white);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh;
  display:flex;
  justify-content:center;
}
.app{
  width:100%;
  max-width: 480px;
  min-height: 100vh;
  display:flex;
  flex-direction:column;
  padding-bottom: 104px;
  position:relative;
}
header{
  padding: 28px 20px 18px;
  border-bottom: 1px solid var(--border);
}
.header-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
.gender-toggle{ display:flex; gap:4px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:4px; flex-shrink:0; }
.g-btn{ width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:transparent; border:none; border-radius:7px; color:var(--muted); }
.g-btn.active{ background: var(--accent); color:#050810; }
.g-btn .g-icon{ display:flex; align-items:center; justify-content:center; height:20px; }
.eyebrow{
  font-size:11px;
  letter-spacing:0.14em;
  text-transform:uppercase;
  color: var(--accent);
  font-weight:600;
  margin:0 0 4px;
}
h1{
  font-family:'Oswald', sans-serif;
  font-size: 26px;
  letter-spacing:0.01em;
  text-transform:uppercase;
  margin:0;
  font-weight:700;
}
main{ padding: 20px; flex:1; }

.segmented{
  display:flex;
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:10px;
  padding:4px;
  gap:4px;
  margin-bottom:18px;
}
.segmented button{
  flex:1;
  padding:9px 0 10px;
  background:transparent;
  border:none;
  border-radius:7px;
  color:var(--muted);
  font-family:'Oswald',sans-serif;
  font-size:12px;
  letter-spacing:0.03em;
  text-transform:uppercase;
  font-weight:600;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
}
.segmented button .tab-icon{ display:flex; align-items:center; justify-content:center; height:20px; }
.segmented button.active{
  background: var(--accent);
  color:#050810;
}

.status{
  font-size:13px;
  color:var(--muted);
  margin:0 0 14px;
  min-height:18px;
}

.reels{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:8px;
}
.reel{
  position:relative;
  background: var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 10px;
  min-height:120px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  gap:5px;
  overflow:hidden;
  color: var(--muted);
}
.reel .icon{ display:flex; align-items:center; justify-content:center; height:26px; color: inherit; }
.reel.settled{ color: var(--accent); }
.reel.cardio.settled{ color: var(--accent-2); }
.reel::before{
  content:'';
  position:absolute; top:7px; left:7px; width:4px; height:4px; border-radius:50%;
  background: var(--border);
}
.reel::after{
  content:'';
  position:absolute; top:7px; right:7px; width:4px; height:4px; border-radius:50%;
  background: var(--border);
}
.reel .name{ font-size:13px; line-height:1.3; color:var(--white); font-weight:500; }
.reel .muscle{ font-size:10px; letter-spacing:0.08em; text-transform:uppercase; color:var(--muted); opacity:0; transition:opacity .2s; }
.reel .reps{ font-size:10px; color:var(--muted); opacity:0; transition:opacity .2s; }
.reel.settled .reps{ opacity:0.85; }
.reel.settled{ border-color: var(--accent); background: var(--accent-dim); }
.reel.settled .muscle{ opacity:1; color:var(--accent); }
.reel.cardio.settled{ border-color:var(--accent-2); background:var(--accent-2-dim); }
.reel.cardio.settled .muscle{ color:var(--accent-2); }

details{
  border-top:1px solid var(--border);
  padding:14px 0;
}
details summary{
  font-family:'Oswald',sans-serif;
  font-size:13px;
  letter-spacing:0.05em;
  text-transform:uppercase;
  color:var(--muted);
  font-weight:600;
  cursor:pointer;
  list-style:none;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
details summary::-webkit-details-marker{ display:none; }
.summary-icon{ display:inline-flex; align-items:center; margin-right:8px; }
details summary::after{
  content:'+';
  font-size:18px;
  color:var(--muted);
}
details[open] summary::after{ content:'–'; }
.chips{ display:flex; flex-wrap:wrap; gap:6px; margin:12px 0; }
.chip{
  display:inline-flex; align-items:center; gap:6px;
  font-size:12px; padding:6px 6px 6px 11px;
  border:1px solid var(--border); border-radius:8px;
  background:var(--surface-2); color:var(--muted);
}
.chip .m{ color:var(--accent); font-size:10px; text-transform:uppercase; }
.chip button{
  background:none;border:none;color:var(--muted);
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  cursor:pointer; font-size:15px; padding:0;
}
.addrow{ display:flex; gap:6px; margin-bottom:8px; }
.addrow input, .addrow select{
  background: var(--surface-2);
  border:1px solid var(--border);
  border-radius:8px;
  color:var(--white);
  font-size:13px;
  padding:10px;
  font-family:'Inter',sans-serif;
  flex:1; min-width:0;
}
.addrow button{
  background:var(--surface-2);
  border:1px solid var(--border);
  color:var(--white);
  border-radius:8px;
  padding:0 16px;
  font-size:13px;
  font-weight:600;
  flex-shrink:0;
}
.sliderow{ display:flex; align-items:center; gap:10px; margin-top:14px; }
.sliderow label{ font-size:12px; color:var(--muted); flex-shrink:0; }
input[type=range]{ flex:1; accent-color: var(--accent); }
.sliderow .out{ font-size:13px; font-weight:600; color:var(--accent); min-width:36px; text-align:right; }

.ghost-btn{ background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:8px; padding:9px 16px; font-size:12px; font-family:'Inter',sans-serif; font-weight:600; width:100%; margin-bottom:16px; }
.ghost-btn:active{ background: var(--surface-2); }
.history-list{ margin:12px 0; display:flex; flex-direction:column; gap:8px; max-height:260px; overflow-y:auto; }
.history-row{ border:1px solid var(--border); border-radius:8px; padding:8px 10px; background:var(--surface-2); }
.history-top{ display:flex; justify-content:space-between; font-size:11px; margin-bottom:4px; }
.history-label{ color: var(--accent); font-weight:600; text-transform:uppercase; letter-spacing:0.04em; }
.history-time{ color:var(--muted); }
.history-items{ font-size:12px; color:var(--white); line-height:1.4; }
.history-empty{ font-size:12px; color:var(--muted); padding:8px 0; }

.anything-section{ border-top:1px solid var(--border); padding-top:20px; margin-top:4px; text-align:center; }
.anything-header{ display:flex; align-items:center; gap:10px; justify-content:center; margin-bottom:16px; }
.anything-title{ font-family:'Oswald',sans-serif; font-size:15px; text-transform:uppercase; letter-spacing:0.04em; color: var(--white); }
.anything-sub{ font-size:12px; color:var(--muted); margin-top:2px; }
.wheel-wrap{ position:relative; width:200px; height:200px; margin:0 auto 16px; }
.wheel{ width:100%; height:100%; border-radius:50%; border:4px solid var(--accent); box-sizing:border-box; background: var(--surface-2); }
.wheel-pointer{ position:absolute; top:-9px; left:50%; transform:translateX(-50%); width:0; height:0; border-left:9px solid transparent; border-right:9px solid transparent; border-bottom:16px solid var(--accent); z-index:2; }
.wheel-hub{ position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:16px; height:16px; border-radius:50%; background:var(--bg); border:2px solid var(--accent); z-index:2; }
.secondary-btn{ background:var(--surface-2); border:1px solid var(--border); color:var(--white); border-radius:10px; padding:12px 22px; font-family:'Oswald',sans-serif; font-size:13px; letter-spacing:0.04em; text-transform:uppercase; font-weight:600; }
.secondary-btn:disabled{ opacity:0.5; }
.anything-result{ margin-top:14px; min-height:20px; display:flex; flex-direction:column; align-items:center; gap:4px; }
.anything-result .icon{ height:26px; display:flex; align-items:center; justify-content:center; color: var(--accent); }
.anything-result .name{ font-size:14px; font-weight:600; color: var(--white); }
.anything-result .muscle{ font-size:11px; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); }

.spinbar{
  position:fixed;
  bottom:0; left:0; right:0;
  display:flex; justify-content:center;
  padding: 16px 20px calc(16px + env(safe-area-inset-bottom));
  background: linear-gradient(to top, var(--bg) 65%, transparent);
}
.spinbar-inner{ width:100%; max-width:440px; }
#spinBtn{
  width:100%;
  background: var(--accent);
  color:#050810;
  border:none;
  border-radius:12px;
  padding:16px;
  font-family:'Oswald',sans-serif;
  font-size:16px;
  letter-spacing:0.05em;
  text-transform:uppercase;
  font-weight:700;
}
#spinBtn:disabled{ opacity:0.5; }
#spinBtn:active{ transform: scale(0.98); }

@media (prefers-reduced-motion: reduce){
  * { transition: none !important; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-row">
      <div>
        <p class="eyebrow">Pull the lever</p>
        <h1>Workout Randomizer</h1>
      </div>
      <div class="gender-toggle" id="genderToggle">
        <button data-g="male" class="g-btn" aria-label="Male figure"><span class="g-icon"></span></button>
        <button data-g="female" class="g-btn" aria-label="Female figure"><span class="g-icon"></span></button>
      </div>
    </div>
  </header>
  <main>
    <div class="segmented">
      <button id="legBtn"><span class="tab-icon"></span><span>Leg</span></button>
      <button id="upperBtn"><span class="tab-icon"></span><span>Upper</span></button>
      <button id="fullBtn"><span class="tab-icon"></span><span>Full Body</span></button>
    </div>

    <p class="status" id="statusline">Choose a day, then spin.</p>

    <div class="reels" id="slots"></div>
    <button id="shareDayBtn" class="ghost-btn" style="display:none;">Copy / Share Workout</button>

    <details id="customizeDetails">
      <summary><span class="summary-icon" id="customizeIcon"></span>Customize workouts</summary>
      <div id="chips" class="chips"></div>
      <div class="addrow">
        <input type="text" id="newExercise" placeholder="Workout name">
      </div>
      <div class="addrow">
        <select id="newMuscle"></select>
        <button id="addBtn">Add</button>
      </div>
    </details>

    <details id="cardioDetails">
      <summary><span class="summary-icon" id="cardioSummaryIcon"></span>Cardio / HIIT options</summary>
      <div id="cardioChips" class="chips"></div>
      <div class="addrow">
        <input type="text" id="newCardio" placeholder="Cardio option">
      </div>
      <div class="addrow">
        <select id="newCardioTarget"></select>
        <button id="addCardioBtn">Add</button>
      </div>
      <div class="sliderow">
        <label>Bonus cardio odds</label>
        <input type="range" min="0" max="100" step="5" value="30" id="probSlider">
        <span class="out" id="probOut">30%</span>
      </div>
    </details>

    <details id="historyDetails">
      <summary><span class="summary-icon" id="historyIcon"></span>Spin History</summary>
      <div id="historyList" class="history-list"></div>
      <button id="clearHistoryBtn" class="ghost-btn">Clear history</button>
    </details>

    <div class="anything-section">
      <div class="anything-header">
        <span class="summary-icon" id="anythingIcon"></span>
        <div>
          <div class="anything-title">Anything Goes</div>
          <div class="anything-sub">One random pick from every list</div>
        </div>
      </div>
      <div class="wheel-wrap">
        <div class="wheel-pointer"></div>
        <div class="wheel" id="wheel"></div>
        <div class="wheel-hub"></div>
      </div>
      <button id="anythingSpinBtn" class="secondary-btn">Spin the Wheel</button>
      <div id="anythingResult" class="anything-result"></div>
      <button id="shareAnythingBtn" class="ghost-btn" style="display:none; margin-top:10px;">Copy / Share Pick</button>
    </div>
  </main>

  <div class="spinbar">
    <div class="spinbar-inner">
      <button id="spinBtn">Spin</button>
    </div>
  </div>
</div>

<script>
const days = {
  leg: [
    {name:"Bulgarian Split Squat", muscle:"Quads"},
    {name:"Romanian Deadlift", muscle:"Hamstrings"},
    {name:"Standing Calf Raise", muscle:"Calves"},
    {name:"Hip Thrust", muscle:"Glutes"},
    {name:"Walking Lunges", muscle:"Quads"}
  ],
  upper: [
    {name:"Push-Ups", muscle:"Chest"},
    {name:"Pull-Ups", muscle:"Back"},
    {name:"Lateral Raises", muscle:"Shoulders"},
    {name:"Face Pulls", muscle:"Rear Delts"},
    {name:"Barbell Curl", muscle:"Biceps"},
    {name:"Overhead Triceps Extension", muscle:"Triceps"}
  ],
  full: [
    {name:"Burpees", muscle:"Full Body"},
    {name:"Kettlebell Swings", muscle:"Glutes"},
    {name:"Thrusters", muscle:"Full Body"},
    {name:"Mountain Climbers", muscle:"Core"},
    {name:"Renegade Rows", muscle:"Back"},
    {name:"Farmer's Carry", muscle:"Forearms"}
  ]
};
const MUSCLE_OPTIONS = ["Quads","Hamstrings","Calves","Glutes","Chest","Back","Shoulders","Rear Delts","Biceps","Triceps","Core","Forearms","Full Body"];
const CARDIO_TARGET_OPTIONS = ["Cardio","Full Body"];
const DAY_LABELS = { leg: 'Leg day', upper: 'Upper day', full: 'Full body day' };

const MUSCLE_PARTS = {
  "Chest": ["torso"],
  "Back": ["torso"],
  "Core": ["torso"],
  "Shoulders": ["armL","armR","torso"],
  "Rear Delts": ["armL","armR","torso"],
  "Biceps": ["armL","armR"],
  "Triceps": ["armL","armR"],
  "Forearms": ["armL","armR"],
  "Quads": ["legL","legR"],
  "Hamstrings": ["legL","legR"],
  "Calves": ["legL","legR"],
  "Glutes": ["legL","legR","torso"]
};

function maleSilhouette(emphasis, size){
  size = size || 22;
  const h = Math.round(size * 1.6);
  const full = emphasis.indexOf('all') !== -1;
  const op = (part) => (full || emphasis.indexOf(part) !== -1) ? '1' : '0.28';
  const t = 'stroke="rgba(0,0,0,0.35)" fill="none" stroke-width="1"';
  return '<svg width="'+size+'" height="'+h+'" viewBox="0 0 40 64" xmlns="http://www.w3.org/2000/svg" fill="currentColor">'
    + '<circle cx="20" cy="7" r="5.5" opacity="'+op('head')+'"/>'
    + '<rect x="17.5" y="10.5" width="5" height="3.5" opacity="'+op('head')+'"/>'
    + '<rect x="8" y="14" width="24" height="4" rx="2" opacity="'+op('torso')+'"/>'
    + '<rect x="11" y="17" width="18" height="9" rx="3" opacity="'+op('torso')+'"/>'
    + '<rect x="13" y="25" width="14" height="9" rx="3" opacity="'+op('torso')+'"/>'
    + '<rect x="12" y="33" width="16" height="5" rx="2" opacity="'+op('torso')+'"/>'
    + '<line x1="20" y1="17" x2="20" y2="25" '+t+'/>'
    + '<ellipse cx="15.5" cy="20.5" rx="3" ry="3" '+t+'/>'
    + '<ellipse cx="24.5" cy="20.5" rx="3" ry="3" '+t+'/>'
    + '<line x1="15" y1="27" x2="25" y2="27" '+t+'/>'
    + '<line x1="15" y1="30" x2="25" y2="30" '+t+'/>'
    + '<line x1="15" y1="33" x2="25" y2="33" '+t+'/>'
    + '<rect x="3" y="16" width="7" height="11" rx="3" opacity="'+op('armL')+'"/>'
    + '<rect x="4" y="27" width="5" height="11" rx="2.5" opacity="'+op('armL')+'"/>'
    + '<rect x="30" y="16" width="7" height="11" rx="3" opacity="'+op('armR')+'"/>'
    + '<rect x="31" y="27" width="5" height="11" rx="2.5" opacity="'+op('armR')+'"/>'
    + '<rect x="12" y="38" width="8" height="13" rx="3" opacity="'+op('legL')+'"/>'
    + '<rect x="13" y="51" width="6" height="13" rx="2.5" opacity="'+op('legL')+'"/>'
    + '<rect x="20" y="38" width="8" height="13" rx="3" opacity="'+op('legR')+'"/>'
    + '<rect x="21" y="51" width="6" height="13" rx="2.5" opacity="'+op('legR')+'"/>'
    + '<line x1="16" y1="40" x2="16" y2="49" '+t+'/>'
    + '<line x1="24" y1="40" x2="24" y2="49" '+t+'/>'
    + '</svg>';
}

function femaleSilhouette(emphasis, size){
  size = size || 22;
  const h = Math.round(size * 1.6);
  const full = emphasis.indexOf('all') !== -1;
  const op = (part) => (full || emphasis.indexOf(part) !== -1) ? '1' : '0.28';
  const t = 'stroke="rgba(0,0,0,0.35)" fill="none" stroke-width="1"';
  return '<svg width="'+size+'" height="'+h+'" viewBox="0 0 40 64" xmlns="http://www.w3.org/2000/svg" fill="currentColor">'
    + '<ellipse cx="25.5" cy="9" rx="2.6" ry="4.5" opacity="'+op('head')+'"/>'
    + '<circle cx="20" cy="7" r="5.2" opacity="'+op('head')+'"/>'
    + '<rect x="17.7" y="10.2" width="4.6" height="3.3" opacity="'+op('head')+'"/>'
    + '<rect x="9" y="14" width="22" height="3.4" rx="1.7" opacity="'+op('torso')+'"/>'
    + '<rect x="12" y="17.4" width="16" height="7.6" rx="3" opacity="'+op('torso')+'"/>'
    + '<rect x="14.5" y="24.5" width="11" height="7" rx="3.5" opacity="'+op('torso')+'"/>'
    + '<rect x="11.5" y="31" width="17" height="6" rx="3" opacity="'+op('torso')+'"/>'
    + '<ellipse cx="16" cy="20.2" rx="2.4" ry="2.4" '+t+'/>'
    + '<ellipse cx="24" cy="20.2" rx="2.4" ry="2.4" '+t+'/>'
    + '<line x1="16.5" y1="27" x2="23.5" y2="27" '+t+'/>'
    + '<line x1="16.5" y1="29.5" x2="23.5" y2="29.5" '+t+'/>'
    + '<rect x="4.5" y="16" width="5.5" height="10" rx="2.75" opacity="'+op('armL')+'"/>'
    + '<rect x="5" y="26" width="4" height="11" rx="2" opacity="'+op('armL')+'"/>'
    + '<rect x="30" y="16" width="5.5" height="10" rx="2.75" opacity="'+op('armR')+'"/>'
    + '<rect x="31" y="26" width="4" height="11" rx="2" opacity="'+op('armR')+'"/>'
    + '<rect x="13" y="37" width="7" height="14" rx="3" opacity="'+op('legL')+'"/>'
    + '<rect x="14" y="51" width="5" height="13" rx="2.5" opacity="'+op('legL')+'"/>'
    + '<rect x="20" y="37" width="7" height="14" rx="3" opacity="'+op('legR')+'"/>'
    + '<rect x="21" y="51" width="5" height="13" rx="2.5" opacity="'+op('legR')+'"/>'
    + '<line x1="16.5" y1="39" x2="16.5" y2="50" '+t+'/>'
    + '<line x1="23.5" y1="39" x2="23.5" y2="50" '+t+'/>'
    + '</svg>';
}

function getSilhouette(emphasis, size){
  return currentGender === 'female' ? femaleSilhouette(emphasis, size) : maleSilhouette(emphasis, size);
}

function cardioPulseIcon(size){
  size = size || 22;
  const h = Math.round(size * 1.55);
  return '<svg width="'+size+'" height="'+h+'" viewBox="0 0 40 64" xmlns="http://www.w3.org/2000/svg" fill="none">'
    + '<path d="M4 32 L12 32 L16 18 L22 46 L27 32 L36 32" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>'
    + '</svg>';
}

function pulseIconSmall(size){
  size = size || 16;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none">'
    + '<path d="M2 12h5l2-7 4 14 3-10 2 3h4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    + '</svg>';
}

function iconForMuscle(muscle, size){
  if(!muscle) return getSilhouette([], size);
  if(muscle === 'Cardio') return cardioPulseIcon(size);
  if(muscle === 'Full Body') return getSilhouette(['all'], size);
  return getSilhouette(MUSCLE_PARTS[muscle] || [], size);
}

function placeholderIcon(size){
  return getSilhouette([], size);
}

function repSuggestion(muscle){
  if(muscle === 'Cardio') return '15–20 min';
  return '3 × 10–12';
}

function clockIcon(size){
  size = size || 16;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor">'
    + '<circle cx="12" cy="12" r="9" stroke-width="2"/>'
    + '<path d="M12 7v5l3.5 2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>'
    + '</svg>';
}

function relativeTime(ts){
  const diff = Date.now() - ts;
  const min = Math.floor(diff / 60000);
  if(min < 1) return 'Just now';
  if(min < 60) return min + 'm ago';
  const hr = Math.floor(min / 60);
  if(hr < 24) return hr + 'h ago';
  const day = Math.floor(hr / 24);
  if(day < 7) return day + 'd ago';
  return new Date(ts).toLocaleDateString();
}

function historyLabel(entry){
  return entry.type === 'day' ? DAY_LABELS[entry.day] : 'Anything Goes';
}

function addHistoryEntry(entry){
  entry.id = 'h' + Date.now() + Math.floor(Math.random() * 1000);
  entry.ts = Date.now();
  history.unshift(entry);
  if(history.length > 10) history = history.slice(0, 10);
  saveState();
  renderHistory();
}

function renderHistory(){
  const container = document.getElementById('historyList');
  container.innerHTML = '';
  if(history.length === 0){
    container.innerHTML = '<div class="history-empty">No spins yet.</div>';
    return;
  }
  history.forEach(entry => {
    const row = document.createElement('div');
    row.className = 'history-row';
    const top = document.createElement('div');
    top.className = 'history-top';
    const label = document.createElement('span');
    label.className = 'history-label';
    label.textContent = historyLabel(entry);
    const time = document.createElement('span');
    time.className = 'history-time';
    time.textContent = relativeTime(entry.ts);
    top.appendChild(label);
    top.appendChild(time);
    const items = document.createElement('div');
    items.className = 'history-items';
    items.textContent = entry.items.map(it => it.name).join(', ');
    row.appendChild(top);
    row.appendChild(items);
    container.appendChild(row);
  });
}

function buildDayShareText(result){
  const lines = result.items.map(it => '- ' + it.name + ' (' + it.muscle + ') ' + repSuggestion(it.muscle));
  return 'Workout Randomizer — ' + DAY_LABELS[result.day] + '\n' + lines.join('\n');
}

function buildAnythingShareText(item){
  return 'Workout Randomizer pick: ' + item.name + ' (' + item.muscle + ') ' + repSuggestion(item.muscle);
}

async function shareOrCopy(text, btnEl){
  const originalLabel = btnEl.textContent;
  if(navigator.share){
    try{
      await navigator.share({ title: 'Workout Randomizer', text });
      return;
    }catch(e){
      // user cancelled the share sheet or it's unsupported here — fall through to copy
    }
  }
  try{
    await navigator.clipboard.writeText(text);
    btnEl.textContent = 'Copied!';
  }catch(e){
    btnEl.textContent = 'Copy failed';
  }
  setTimeout(() => { btnEl.textContent = originalLabel; }, 1600);
}

function diceIcon(size){
  size = size || 16;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor">'
    + '<rect x="3" y="3" width="18" height="18" rx="4" stroke-width="2"/>'
    + '<circle cx="8" cy="8" r="1.6" fill="currentColor" stroke="none"/>'
    + '<circle cx="16" cy="8" r="1.6" fill="currentColor" stroke="none"/>'
    + '<circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/>'
    + '<circle cx="8" cy="16" r="1.6" fill="currentColor" stroke="none"/>'
    + '<circle cx="16" cy="16" r="1.6" fill="currentColor" stroke="none"/>'
    + '</svg>';
}

function adjustIcon(size){
  size = size || 16;
  return '<svg width="'+size+'" height="'+size+'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" stroke="currentColor">'
    + '<line x1="4" y1="6" x2="20" y2="6" stroke-width="2" stroke-linecap="round"/>'
    + '<line x1="4" y1="12" x2="20" y2="12" stroke-width="2" stroke-linecap="round"/>'
    + '<line x1="4" y1="18" x2="20" y2="18" stroke-width="2" stroke-linecap="round"/>'
    + '<circle cx="9" cy="6" r="2.4" fill="#070B12" stroke-width="2"/>'
    + '<circle cx="16" cy="12" r="2.4" fill="#070B12" stroke-width="2"/>'
    + '<circle cx="9" cy="18" r="2.4" fill="#070B12" stroke-width="2"/>'
    + '</svg>';
}
let cardioPool = [
  {name:"HIIT Intervals", muscle:"Cardio"},
  {name:"Treadmill Run", muscle:"Cardio"},
  {name:"Rowing", muscle:"Cardio"},
  {name:"Jump Rope", muscle:"Cardio"},
  {name:"Cycling", muscle:"Cardio"},
  {name:"Elliptical", muscle:"Cardio"}
];
let cardioProbability = 30;
let currentDay = 'upper';
let currentGender = 'male';
let spinning = false;
let wheelRotation = 0;
let wheelSpinning = false;
let lastAnythingItem = null;
let lastDayResult = null;
let history = [];

const STORAGE_KEY = 'workout-randomizer-state-v2';

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const saved = JSON.parse(raw);
    if(saved.days) Object.assign(days, saved.days);
    if(saved.cardioPool) cardioPool = saved.cardioPool;
    if(typeof saved.cardioProbability === 'number') cardioProbability = saved.cardioProbability;
    if(saved.currentDay) currentDay = saved.currentDay;
    if(saved.currentGender) currentGender = saved.currentGender;
    if(Array.isArray(saved.history)) history = saved.history;
  }catch(e){
    console.error('Could not load saved state', e);
  }
}

function saveState(){
  try{
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ days, cardioPool, cardioProbability, currentDay, currentGender, history }));
  }catch(e){
    console.error('Could not save state', e);
  }
}

function renderChips(){
  const container = document.getElementById('chips');
  container.innerHTML = '';
  days[currentDay].forEach((item, idx) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    const label = document.createElement('span');
    label.innerHTML = item.name + ' <span class="m">· ' + item.muscle + '</span>';
    const btn = document.createElement('button');
    btn.setAttribute('aria-label', 'Remove ' + item.name);
    btn.textContent = '×';
    btn.addEventListener('click', () => {
      days[currentDay].splice(idx, 1);
      renderChips();
      renderPlaceholders();
      saveState();
    });
    chip.appendChild(label);
    chip.appendChild(btn);
    container.appendChild(chip);
  });
}

function renderCardioChips(){
  const container = document.getElementById('cardioChips');
  container.innerHTML = '';
  cardioPool.forEach((item, idx) => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    const label = document.createElement('span');
    label.innerHTML = item.name + ' <span class="m">· ' + item.muscle + '</span>';
    const btn = document.createElement('button');
    btn.setAttribute('aria-label', 'Remove ' + item.name);
    btn.textContent = '×';
    btn.addEventListener('click', () => {
      cardioPool.splice(idx, 1);
      renderCardioChips();
      saveState();
    });
    chip.appendChild(label);
    chip.appendChild(btn);
    container.appendChild(chip);
  });
}

function setGender(g){
  currentGender = g;
  document.querySelectorAll('.g-btn').forEach(b => b.classList.toggle('active', b.dataset.g === g));
  refreshAllIcons();
  saveState();
}

function refreshAllIcons(){
  document.querySelector('#legBtn .tab-icon').innerHTML = getSilhouette(['legL','legR'], 20);
  document.querySelector('#upperBtn .tab-icon').innerHTML = getSilhouette(['head','torso','armL','armR'], 20);
  document.querySelector('#fullBtn .tab-icon').innerHTML = getSilhouette(['all'], 20);
  document.querySelectorAll('.reel').forEach(reel => {
    const iconEl = reel.querySelector('.icon');
    if(iconEl) iconEl.innerHTML = iconForMuscle(reel.dataset.muscle || '', 24);
  });
  if(lastAnythingItem){
    const iconEl = document.querySelector('#anythingResult .icon');
    if(iconEl) iconEl.innerHTML = iconForMuscle(lastAnythingItem.muscle, 26);
  }
}

document.querySelectorAll('.g-btn').forEach(btn => {
  btn.addEventListener('click', () => setGender(btn.dataset.g));
});

document.querySelector('#genderToggle [data-g="male"] .g-icon').innerHTML = maleSilhouette(['all'], 18);
document.querySelector('#genderToggle [data-g="female"] .g-icon').innerHTML = femaleSilhouette(['all'], 18);

function setActiveDay(day){
  currentDay = day;
  document.getElementById('legBtn').classList.toggle('active', day === 'leg');
  document.getElementById('upperBtn').classList.toggle('active', day === 'upper');
  document.getElementById('fullBtn').classList.toggle('active', day === 'full');
  document.getElementById('statusline').textContent = DAY_LABELS[day] + ' selected. Spin to pick.';
  document.getElementById('shareDayBtn').style.display = 'none';
  lastDayResult = null;
  renderChips();
  renderPlaceholders();
  saveState();
}

function renderPlaceholders(){
  const pool = days[currentDay];
  const n = Math.min(pool.length, 5) || 1;
  const container = document.getElementById('slots');
  container.innerHTML = '';
  for(let i=0;i<n;i++){
    const box = document.createElement('div');
    box.className = 'reel';
    box.dataset.muscle = '';
    const icon = document.createElement('div');
    icon.className = 'icon';
    icon.innerHTML = placeholderIcon(24);
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = '?';
    const muscle = document.createElement('div');
    muscle.className = 'muscle';
    const reps = document.createElement('div');
    reps.className = 'reps';
    box.appendChild(icon);
    box.appendChild(name);
    box.appendChild(muscle);
    box.appendChild(reps);
    container.appendChild(box);
  }
}

function renderSlots(n, hasCardio){
  const container = document.getElementById('slots');
  container.innerHTML = '';
  const total = n + (hasCardio ? 1 : 0);
  for(let i=0;i<total;i++){
    const box = document.createElement('div');
    box.className = 'reel' + (hasCardio && i === total-1 ? ' cardio' : '');
    box.id = 'reel-' + i;
    box.dataset.muscle = '';
    const icon = document.createElement('div');
    icon.className = 'icon';
    icon.innerHTML = placeholderIcon(24);
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = '?';
    const muscle = document.createElement('div');
    muscle.className = 'muscle';
    const reps = document.createElement('div');
    reps.className = 'reps';
    box.appendChild(icon);
    box.appendChild(name);
    box.appendChild(muscle);
    box.appendChild(reps);
    container.appendChild(box);
  }
}

function spin(){
  if(spinning) return;
  const pool = days[currentDay];
  if(pool.length === 0){
    document.getElementById('statusline').textContent = 'Add at least one workout first.';
    return;
  }
  spinning = true;
  document.getElementById('spinBtn').setAttribute('disabled','');
  document.getElementById('statusline').textContent = 'Spinning...';
  document.getElementById('shareDayBtn').style.display = 'none';

  const options = [4,5].filter(x => x <= pool.length);
  const n = options.length ? options[Math.floor(Math.random()*options.length)] : pool.length;
  const final = pool.slice().sort(()=>Math.random()-0.5).slice(0,n);

  const hasCardio = cardioPool.length > 0 && (Math.random()*100 < cardioProbability);
  const cardioPick = hasCardio ? cardioPool[Math.floor(Math.random()*cardioPool.length)] : null;
  const total = n + (hasCardio ? 1 : 0);

  renderSlots(n, hasCardio);

  let settledCount = 0;
  const collectedPicks = [];
  for(let i=0;i<total;i++){
    const isCardioSlot = hasCardio && i === total-1;
    const reel = document.getElementById('reel-' + i);
    const iconEl = reel.querySelector('.icon');
    const nameEl = reel.querySelector('.name');
    const muscleEl = reel.querySelector('.muscle');
    const repsEl = reel.querySelector('.reps');
    const spinDuration = 900 + i*350;
    const tickRate = 55;
    const sourcePool = isCardioSlot ? cardioPool : pool;
    const interval = setInterval(()=>{
      nameEl.textContent = sourcePool[Math.floor(Math.random()*sourcePool.length)].name;
    }, tickRate);
    setTimeout(()=>{
      clearInterval(interval);
      const finalItem = isCardioSlot ? cardioPick : final[i];
      nameEl.textContent = finalItem.name;
      muscleEl.textContent = finalItem.muscle;
      repsEl.textContent = repSuggestion(finalItem.muscle);
      reel.dataset.muscle = finalItem.muscle;
      iconEl.innerHTML = iconForMuscle(finalItem.muscle, 24);
      reel.classList.add('settled');
      collectedPicks.push(finalItem);
      settledCount++;
      if(settledCount === total){
        spinning = false;
        document.getElementById('spinBtn').removeAttribute('disabled');
        document.getElementById('statusline').textContent = total + ' slots picked for ' + DAY_LABELS[currentDay].toLowerCase() + (hasCardio ? ' plus a bonus cardio slot' : '') + '.';
        lastDayResult = { day: currentDay, items: collectedPicks };
        document.getElementById('shareDayBtn').style.display = 'inline-flex';
        addHistoryEntry({ type:'day', day: currentDay, items: collectedPicks });
      }
    }, spinDuration);
  }
}

function buildWheelGradient(n){
  const colors = ['var(--accent)', 'var(--surface-2)'];
  const step = 360 / n;
  const stops = [];
  for(let i=0;i<n;i++){
    stops.push(colors[i % 2] + ' ' + (i*step) + 'deg ' + ((i+1)*step) + 'deg');
  }
  return 'conic-gradient(from 0deg, ' + stops.join(', ') + ')';
}

function spinAnything(){
  if(wheelSpinning) return;
  const allItems = [
    ...days.leg.map(x => ({...x, source:'Leg day'})),
    ...days.upper.map(x => ({...x, source:'Upper day'})),
    ...days.full.map(x => ({...x, source:'Full body day'})),
    ...cardioPool.map(x => ({...x, source:'Cardio'}))
  ];
  const resultEl = document.getElementById('anythingResult');
  if(allItems.length === 0){
    resultEl.innerHTML = '<div class="name">Add some workouts first.</div>';
    return;
  }
  wheelSpinning = true;
  document.getElementById('anythingSpinBtn').setAttribute('disabled','');
  document.getElementById('shareAnythingBtn').style.display = 'none';
  resultEl.innerHTML = '';

  const n = allItems.length;
  const wheelEl = document.getElementById('wheel');
  wheelEl.style.background = buildWheelGradient(n);

  const idx = Math.floor(Math.random() * n);
  const step = 360 / n;
  const spins = 5 + Math.floor(Math.random() * 3);
  const targetWithinTurn = 360 - (idx * step + step / 2);
  const currentMod = wheelRotation % 360;
  const delta = (((targetWithinTurn - currentMod) % 360) + 360) % 360;
  const newRotation = wheelRotation + spins * 360 + delta;

  wheelEl.style.transition = 'transform 3.4s cubic-bezier(0.12,0.67,0.1,1)';
  wheelEl.style.transform = 'rotate(' + newRotation + 'deg)';
  wheelRotation = newRotation;

  setTimeout(() => {
    const item = allItems[idx];
    lastAnythingItem = item;
    const icon = document.createElement('div');
    icon.className = 'icon';
    icon.innerHTML = iconForMuscle(item.muscle, 26);
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = item.name;
    const muscle = document.createElement('div');
    muscle.className = 'muscle';
    muscle.textContent = item.muscle + ' · ' + item.source;
    const reps = document.createElement('div');
    reps.className = 'reps';
    reps.style.opacity = '0.85';
    reps.textContent = repSuggestion(item.muscle);
    resultEl.appendChild(icon);
    resultEl.appendChild(name);
    resultEl.appendChild(muscle);
    resultEl.appendChild(reps);
    wheelSpinning = false;
    document.getElementById('anythingSpinBtn').removeAttribute('disabled');
    document.getElementById('shareAnythingBtn').style.display = 'inline-flex';
    addHistoryEntry({ type:'wheel', items:[item] });
  }, 3500);
}

document.getElementById('anythingSpinBtn').addEventListener('click', spinAnything);
document.getElementById('anythingIcon').innerHTML = diceIcon(16);
document.getElementById('historyIcon').innerHTML = clockIcon(16);

document.getElementById('shareDayBtn').addEventListener('click', () => {
  if(!lastDayResult) return;
  shareOrCopy(buildDayShareText(lastDayResult), document.getElementById('shareDayBtn'));
});
document.getElementById('shareAnythingBtn').addEventListener('click', () => {
  if(!lastAnythingItem) return;
  shareOrCopy(buildAnythingShareText(lastAnythingItem), document.getElementById('shareAnythingBtn'));
});
document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  history = [];
  saveState();
  renderHistory();
});

document.getElementById('legBtn').addEventListener('click', ()=>setActiveDay('leg'));
document.getElementById('upperBtn').addEventListener('click', ()=>setActiveDay('upper'));
document.getElementById('fullBtn').addEventListener('click', ()=>setActiveDay('full'));
document.getElementById('spinBtn').addEventListener('click', spin);

document.getElementById('addBtn').addEventListener('click', ()=>{
  const nameInput = document.getElementById('newExercise');
  const muscleSelect = document.getElementById('newMuscle');
  const name = nameInput.value.trim();
  const muscle = muscleSelect.value;
  if(name){
    days[currentDay].push({name, muscle});
    nameInput.value = '';
    renderChips();
    renderPlaceholders();
    saveState();
  }
});
document.getElementById('newExercise').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ document.getElementById('addBtn').click(); }
});

document.getElementById('addCardioBtn').addEventListener('click', ()=>{
  const nameInput = document.getElementById('newCardio');
  const targetSelect = document.getElementById('newCardioTarget');
  const name = nameInput.value.trim();
  const muscle = targetSelect.value;
  if(name){
    cardioPool.push({name, muscle});
    nameInput.value = '';
    renderCardioChips();
    saveState();
  }
});
document.getElementById('newCardio').addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){ document.getElementById('addCardioBtn').click(); }
});

document.getElementById('probSlider').addEventListener('input', (e)=>{
  cardioProbability = Number(e.target.value);
  document.getElementById('probOut').textContent = cardioProbability + '%';
  saveState();
});

function populateSelect(id, options){
  const select = document.getElementById(id);
  select.innerHTML = '';
  options.forEach(opt => {
    const el = document.createElement('option');
    el.value = opt;
    el.textContent = opt;
    select.appendChild(el);
  });
}
populateSelect('newMuscle', MUSCLE_OPTIONS);
populateSelect('newCardioTarget', CARDIO_TARGET_OPTIONS);

document.getElementById('customizeIcon').innerHTML = adjustIcon(16);
document.getElementById('cardioSummaryIcon').innerHTML = pulseIconSmall(16);

loadState();
document.querySelectorAll('.g-btn').forEach(b => b.classList.toggle('active', b.dataset.g === currentGender));
document.getElementById('probSlider').value = cardioProbability;
document.getElementById('probOut').textContent = cardioProbability + '%';
setActiveDay(currentDay);
renderCardioChips();
renderHistory();
refreshAllIcons();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((e) => console.error('SW registration failed', e));
  });
}
</script>
